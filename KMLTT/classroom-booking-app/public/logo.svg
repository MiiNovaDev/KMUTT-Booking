<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="kmlttGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f27024" /> <!-- KMUTT Orange -->
      <stop offset="100%" stop-color="#d12420" /> <!-- KMUTT Red -->
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Rounded Background -->
  <rect width="40" height="40" rx="10" fill="url(#kmlttGrad)" filter="url(#shadow)" />
  
  <!-- Stylized 'K' Letter -->
  <path d="M 14 10 L 14 30" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" />
  <path d="M 27 10 L 14 20 L 27 30" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
