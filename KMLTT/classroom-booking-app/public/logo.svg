<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="ectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f27024" /> <!-- Orange -->
      <stop offset="100%" stop-color="#d12420" /> <!-- Red -->
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Rounded Background -->
  <rect width="40" height="40" rx="8" fill="url(#ectGrad)" filter="url(#shadow)" />
  
  <!-- Stylized 'E' for ECT -->
  <path d="M 12 10 L 28 10 M 12 20 L 25 20 M 12 30 L 28 30 M 12 10 L 12 30" 
        stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" fill="none" />
</svg>
